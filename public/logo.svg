<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 100" fill="none">
  <defs>
    <linearGradient id="auraGradient" x1="20" y1="20" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="auraTextGradient" x1="240" y1="30" x2="350" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="50" cy="50" r="30" stroke="url(#auraGradient)" stroke-width="6" filter="url(#glow)" opacity="0.95"/>
  <path d="M50 23 L33 67 L67 67 Z" stroke="#211B12" stroke-width="4" stroke-linejoin="round"/>
  <path d="M38 53 L62 53" stroke="#211B12" stroke-width="4" stroke-linecap="round"/>
  <text x="100" y="67" font-family="Fraunces, Georgia, 'Times New Roman', serif" font-size="50" font-weight="600" letter-spacing="-1" fill="#211B12">Aura<tspan fill="url(#auraTextGradient)">CV</tspan></text>
</svg>
